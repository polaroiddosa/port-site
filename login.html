<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaroid Dosa — Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #F39C12;
            --bg: #080808;
            --text: #F5F5F5;
            --muted: #888888;
            --border: rgba(255, 255, 255, 0.1);
            --card-bg: #111111;
            --heading-font: 'Bricolage Grotesque', sans-serif;
            --body-font: 'Bricolage Grotesque', sans-serif;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body-font);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 60px 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            animation: slideUp 0.8s var(--ease);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: inline-block;
            font-family: var(--heading-font);
            font-size: 24px; font-weight: 800;
            text-transform: none; margin-bottom: 40px;
            text-decoration: none; color: inherit;
        }
        .logo img { height: 32px; width: auto; }
        .logo span { color: var(--orange); }

        h2 {
            font-family: var(--heading-font);
            font-size: 32px; text-transform: uppercase;
            letter-spacing: -1px; margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; text-align: left; }
        label {
            display: block; font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            color: var(--orange); margin-bottom: 10px;
        }
        input {
            width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border); color: var(--text);
            font-family: inherit; font-size: 14px; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--orange); background: rgba(243, 156, 18, 0.05); }

        .btn-login {
            width: 100%; padding: 18px; background: var(--orange);
            color: #000; border: none; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.4s var(--ease);
            margin-top: 10px;
        }
        .btn-login:hover { background: #fff; transform: translateY(-5px); }

        .error-msg {
            color: #ff4444; font-size: 12px; margin-top: 15px;
            display: none;
        }

        /* Decorative background elements */
        .bg-glow {
            position: absolute; width: 300px; height: 300px;
            background: var(--orange); filter: blur(150px);
            opacity: 0.05; border-radius: 50%; z-index: -1;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="login-card">
        <a href="index.html" class="logo">
            Polaroid<span>.</span>Dosa
        </a>
        <h2>Admin Access</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="dosa@mail" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Verify Identity</button>
            <p class="error-msg" id="errorMsg">Invalid credentials. Access denied.</p>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Hardcoded credentials as requested
            if (email === 'dosa@mail' && password === 'dosa1234') {
                sessionStorage.setItem('pd_admin_auth', 'true');
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            }
        });

        // Redirect if already logged in
        if (sessionStorage.getItem('pd_admin_auth') === 'true') {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
